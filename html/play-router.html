<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do it router</title>
</head>

<body>
    <h1>Oct 23 2021 , Router review</h1>
    <div id="app">
        <!-- route-view 생성 -->
        <!-- path 에 따라 router-view 의 값이 바뀐다 -->
        <router-link to="/hello">Hello!</router-link>
        <router-link to="/saveThatMoney">SaveThatMoney</router-link>
        <router-view></router-view>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <script src="https://unpkg.com/vue-router/dist/vue-router.js"></script>
    <script>
        let Hello = {
            template: '<div>Hello I am Minwoo</div>'
        };
        let SaveThatMoney = {
            template: '<div>You should be save that money!</div>'
        };

        let routerReview = new VueRouter({
            routes: [
                {
                    // 1. 경로를 설정
                    path: '/hello',
                    // 2. 컴포넌트 생성후 위에 만들 변수명과 같게 작성
                    // ''없이 작성 스트링 아니고 변수임
                    component: Hello
                },
                {
                    path: '/saveThatMoney',
                    component: SaveThatMoney
                }
            ]
        });

        new Vue({
            el: '#app',
            router: routerReview
        })
    </script>
</body>

</html>
